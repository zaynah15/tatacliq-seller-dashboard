version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tatacliq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: seller_admin
      POSTGRES_PASSWORD: change_me_in_env
      POSTGRES_DB: seller_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tatacliq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Phase 2+: Python AI worker
  # ai-worker:
  #   build: ./workers/python
  #   environment:
  #     - GEMINI_API_KEY=${GEMINI_API_KEY}
  #   depends_on:
  #     - postgres
  #     - redis

volumes:
  postgres_data:
  redis_data:
